name: distributed-ecommerce
x-node-service: &node-service
  build: ./node-services
  restart: unless-stopped
  environment: &node-env
    JWT_SECRET: ${JWT_SECRET:-development-secret-change-me-32-chars}
    MONGO_URL: mongodb://${MONGO_USER:-ecommerce}:${MONGO_PASSWORD:-ecommerce}@mongo:27017/ecommerce?authSource=admin
    POSTGRES_URL: postgresql://${POSTGRES_USER:-ecommerce}:${POSTGRES_PASSWORD:-ecommerce}@postgres:5432/${POSTGRES_DB:-ecommerce}
    REDIS_URL: redis://redis:6379
    RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672
  depends_on:
    mongo: { condition: service_healthy }
    postgres: { condition: service_healthy }
    redis: { condition: service_healthy }
    rabbitmq: { condition: service_healthy }
services:
  gateway:
    <<: *node-service
    environment: { <<: *node-env, SERVICE_NAME: gateway, PORT: 3000 }
    ports: ["3000:3000"]
  user-service:
    <<: *node-service
    environment: { <<: *node-env, SERVICE_NAME: user, PORT: 3001 }
  product-service:
    <<: *node-service
    environment: { <<: *node-env, SERVICE_NAME: product, PORT: 3002 }
  inventory-service:
    <<: *node-service
    environment: { <<: *node-env, SERVICE_NAME: inventory, PORT: 3004 }
  payment-service:
    <<: *node-service
    environment: { <<: *node-env, SERVICE_NAME: payment, PORT: 3005 }
  notification-service:
    <<: *node-service
    environment: { <<: *node-env, SERVICE_NAME: notification, PORT: 3006 }
  order-service:
    build: ./order-service
    restart: unless-stopped
    environment:
      JWT_SECRET: ${JWT_SECRET:-development-secret-change-me-32-chars}
      POSTGRES_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-ecommerce}
      POSTGRES_USER: ${POSTGRES_USER:-ecommerce}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ecommerce}
      RABBITMQ_HOST: rabbitmq
    depends_on:
      postgres: { condition: service_healthy }
      rabbitmq: { condition: service_healthy }
  postgres:
    image: postgres:17-alpine
    environment:
      {
        POSTGRES_USER: "${POSTGRES_USER:-ecommerce}",
        POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:-ecommerce}",
        POSTGRES_DB: "${POSTGRES_DB:-ecommerce}",
      }
    volumes: ["postgres-data:/var/lib/postgresql/data"]
    healthcheck:
      {
        test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER}"],
        interval: 5s,
        timeout: 3s,
        retries: 15,
      }
  mongo:
    image: mongo:8
    environment:
      {
        MONGO_INITDB_ROOT_USERNAME: "${MONGO_USER:-ecommerce}",
        MONGO_INITDB_ROOT_PASSWORD: "${MONGO_PASSWORD:-ecommerce}",
      }
    volumes: ["mongo-data:/data/db"]
    healthcheck:
      {
        test:
          ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"],
        interval: 5s,
        timeout: 4s,
        retries: 15,
      }
  redis:
    image: redis:8-alpine
    volumes: ["redis-data:/data"]
    healthcheck:
      {
        test: ["CMD", "redis-cli", "ping"],
        interval: 5s,
        timeout: 3s,
        retries: 15,
      }
  rabbitmq:
    image: rabbitmq:4-management-alpine
    ports: ["15672:15672"]
    healthcheck:
      {
        test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"],
        interval: 5s,
        timeout: 5s,
        retries: 20,
      }
volumes: { postgres-data: {}, mongo-data: {}, redis-data: {} }
